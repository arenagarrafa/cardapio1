<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Arena Garrafa — Área VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060d1a;
    --panel:#0e1e38;
    --panel2:#132949;
    --accent:#3ea6ff;
    --gold:#f2b134;
    --gold-light:#ffd873;
    --white:#f4f6fa;
    --muted:#84a0c4;
    --red:#e2483d;
    --line:rgba(62,166,255,0.18);
    --gold-line:rgba(242,177,52,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:
      radial-gradient(ellipse 100% 36% at 50% 0%, rgba(62,166,255,0.10), transparent),
      var(--bg);
    color:var(--white);
    font-family:'Barlow Condensed',sans-serif;
    min-height:100vh;
  }

  /* ===== HERO ===== */
  .hero{
    text-align:center;
    padding:34px 20px 20px;
  }
  .hero .crown{font-size:24px;letter-spacing:8px;color:var(--gold);}
  .hero h1{
    font-family:'Anton',sans-serif;
    font-size:34px;letter-spacing:0.06em;
    margin-top:8px;
    text-shadow:0 0 18px rgba(62,166,255,0.45);
  }
  .hero .sub{
    display:inline-block;
    font-size:14px;font-weight:800;letter-spacing:0.42em;
    color:#241500;margin-top:8px;text-transform:uppercase;
    background:linear-gradient(180deg,var(--gold-light),var(--gold));
    padding:4px 16px 4px 20px;
    clip-path:polygon(4% 0%, 100% 0%, 96% 100%, 0% 100%);
  }

  /* ===== GRADE DE CATEGORIAS (tela inicial) ===== */
  .cat-grid{
    max-width:560px;margin:0 auto;
    padding:18px 16px 8px;
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .cat-card{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(180deg, var(--panel2), var(--panel));
    border:1px solid var(--line);
    border-radius:12px;
    padding:18px 10px;
    text-decoration:none;
    color:var(--white);
    text-align:center;
    transition:transform 0.12s ease, border-color 0.12s ease;
  }
  .cat-card:active{transform:scale(0.97);border-color:var(--gold);}
  .cat-card .mark{
    width:26px;height:3px;border-radius:2px;
    background:linear-gradient(90deg, var(--gold), var(--gold-light));
  }
  .cat-card .lbl{
    font-size:17px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;line-height:1.2;
  }
  .cat-card .qtd{font-size:12.5px;color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;}

  /* ===== NAV DE SEÇÕES (aparece só depois que rola) ===== */
  nav{
    position:sticky;top:0;z-index:10;
    background:rgba(6,13,26,0.96);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    overflow-x:auto;white-space:nowrap;
    padding:10px 14px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none;}
  nav a{
    display:inline-block;
    color:var(--muted);text-decoration:none;
    font-size:14.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
    border:1px solid var(--line);border-radius:20px;
    padding:7px 14px;margin-right:7px;
    transition:all 0.2s ease;
  }
  nav a:active, nav a.on{color:#04101f;background:var(--accent);border-color:var(--accent);}

  /* ===== SEÇÕES ===== */
  main{max-width:560px;margin:0 auto;padding:6px 18px 40px;}
  section{padding-top:26px;scroll-margin-top:64px;}
  section h2{
    font-size:19px;font-weight:800;letter-spacing:0.12em;
    color:var(--gold);text-transform:uppercase;
    display:flex;align-items:center;gap:12px;
    margin-bottom:12px;
  }
  section h2::after{content:"";flex:1;height:1px;background:linear-gradient(90deg, var(--gold-line), transparent);}

  .item{
    display:flex;align-items:baseline;gap:8px;
    padding:9px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .item .name{font-size:18px;font-weight:500;color:var(--white);}
  .item .dots{flex:1;border-bottom:1px dotted rgba(132,160,196,0.45);transform:translateY(-4px);min-width:14px;}
  .item .price{
    font-family:'Barlow',sans-serif;font-size:16.5px;font-weight:700;
    color:var(--gold-light);white-space:nowrap;font-variant-numeric:tabular-nums;
  }

  .item.sold-out .name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--red);}
  .item.sold-out .price, .item.sold-out .dots{display:none;}
  .item.sold-out .tag{
    margin-left:auto;
    font-family:'Barlow',sans-serif;font-weight:700;font-size:11.5px;
    color:var(--red);border:1px solid var(--red);border-radius:3px;
    padding:2px 8px;letter-spacing:0.08em;
  }

  /* botão de voltar ao topo */
  #topo-btn{
    position:fixed;right:16px;bottom:18px;z-index:11;
    width:46px;height:46px;border-radius:50%;
    background:var(--gold);color:#241500;border:none;
    font-size:20px;font-weight:800;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.5);
    display:none;
  }

  /* ===== RODAPÉ ===== */
  footer{
    text-align:center;padding:28px 20px 42px;
    border-top:1px solid var(--line);
    color:var(--muted);font-size:14.5px;font-weight:600;letter-spacing:0.05em;
  }
  footer b{color:var(--gold);}

  #loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:17px;}
</style>
</head>
<body>

  <div class="hero">
    <div class="crown">✦ ✦ ✦</div>
    <h1>ARENA GARRAFA</h1>
    <span class="sub">Área VIP</span>
  </div>

  <div class="cat-grid" id="cat-grid"></div>

  <nav id="nav"></nav>
  <div id="loading">Carregando cardápio…</div>
  <main id="menu"></main>

  <button id="topo-btn" title="Voltar ao topo">↑</button>

  <footer>
    POVOADO SANTA LUZ DE BAIXO<br>
    <b>@arena.garrafa</b>
  </footer>

<script>
  const DATA_URL = 'vip.json';
  const POLL_SECONDS = 60;

  let lastDataString = null;

  function cacheBustedUrl(url){
    return url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
  }

  function itemStatus(it){
    if(it.status) return it.status;
    if(it.esgotado === true) return 'esgotado';
    return 'disponivel';
  }

  function slugify(s){
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  function shortTitle(t){
    return t.split('—')[0].trim();
  }

  function render(data){
    const grid = document.getElementById('cat-grid');
    const nav = document.getElementById('nav');
    const menu = document.getElementById('menu');
    grid.innerHTML = '';
    nav.innerHTML = '';
    menu.innerHTML = '';

    data.slides.forEach(sec => {
      const items = sec.columns.flat().filter(it => !it.subhead && itemStatus(it) !== 'oculto');
      if(!items.length) return;

      const id = slugify(sec.title);
      const disponiveis = items.filter(it => itemStatus(it) === 'disponivel').length;

      // card grande na tela inicial
      const card = document.createElement('a');
      card.className = 'cat-card';
      card.href = '#' + id;
      card.innerHTML = `
        <span class="mark"></span>
        <span class="lbl">${shortTitle(sec.title)}</span>
        <span class="qtd">${disponiveis} ${disponiveis === 1 ? 'item' : 'itens'}</span>`;
      grid.appendChild(card);

      // chip na barra fixa
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = shortTitle(sec.title);
      nav.appendChild(a);

      // seção do cardápio
      const section = document.createElement('section');
      section.id = id;
      section.innerHTML = `<h2>${sec.title}</h2>` + items.map(it => {
        const soldOut = itemStatus(it) === 'esgotado';
        return `
          <div class="item${soldOut ? ' sold-out' : ''}">
            <span class="name">${it.name}</span>
            <span class="dots"></span>
            <span class="price">${it.price || ''}</span>
            ${soldOut ? '<span class="tag">ESGOTADO</span>' : ''}
          </div>`;
      }).join('');
      menu.appendChild(section);
    });

    // destaca o chip da seção visível
    const links = [...nav.querySelectorAll('a')];
    const sections = [...menu.querySelectorAll('section')];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          links.forEach(l => l.classList.toggle('on', l.getAttribute('href') === '#' + e.target.id));
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    sections.forEach(s => obs.observe(s));
  }

  // botão voltar ao topo (aparece depois que rola)
  const topoBtn = document.getElementById('topo-btn');
  window.addEventListener('scroll', () => {
    topoBtn.style.display = window.scrollY > 400 ? 'block' : 'none';
  });
  topoBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

  async function load(){
    try{
      const res = await fetch(cacheBustedUrl(DATA_URL), { cache: 'no-store' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if(text !== lastDataString){
        lastDataString = text;
        render(JSON.parse(text));
        document.getElementById('loading').style.display = 'none';
      }
    } catch(err){
      document.getElementById('loading').textContent = 'Não foi possível carregar o cardápio. Verifique sua conexão.';
      console.error(err);
    }
  }

  load();
  setInterval(load, POLL_SECONDS * 1000);
</script>

</body>
</html>
